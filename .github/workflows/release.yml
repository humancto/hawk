name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target "$TARGET" -p hawk-cloud
        env:
          TARGET: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ARCHIVE_NAME="hawk-${REF_NAME}-${TARGET}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${TARGET}/release/hawk" "${ARCHIVE_NAME}/"
          cp README.md LICENSE "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: hawk-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${REF_NAME}" \
            --title "Hawk ${REF_NAME}" \
            --generate-notes \
            artifacts/**/*.tar.gz

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish hawk_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p hawk_core --allow-dirty || true

      - name: Publish hawk_render
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          sleep 30
          cargo publish -p hawk_render --allow-dirty || true

      - name: Publish hawk_aws
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          sleep 30
          cargo publish -p hawk_aws --allow-dirty || true

      - name: Publish hawk-cloud
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          sleep 30
          cargo publish -p hawk-cloud --allow-dirty || true

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 hashes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-apple-darwin aarch64-apple-darwin; do
            FILE="artifacts/hawk-${target}/hawk-${REF_NAME}-${target}.tar.gz"
            HASH=$(sha256sum "${FILE}" | awk '{print $1}')
            VAR=$(echo "${target}" | tr '-' '_')
            echo "SHA_${VAR}=${HASH}" >> "$GITHUB_ENV"
          done

      - name: Update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          SHA_x86_64_unknown_linux_gnu: ${{ env.SHA_x86_64_unknown_linux_gnu }}
          SHA_aarch64_unknown_linux_gnu: ${{ env.SHA_aarch64_unknown_linux_gnu }}
          SHA_x86_64_apple_darwin: ${{ env.SHA_x86_64_apple_darwin }}
          SHA_aarch64_apple_darwin: ${{ env.SHA_aarch64_apple_darwin }}
        run: |
          VERSION="${REF_NAME#v}"
          cat > hawk.rb <<FORMULA
          class Hawk < Formula
            desc "Map your AWS serverless architecture in seconds"
            homepage "https://github.com/humancto/hawk"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/humancto/hawk/releases/download/${REF_NAME}/hawk-${REF_NAME}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_aarch64_apple_darwin}"
              else
                url "https://github.com/humancto/hawk/releases/download/${REF_NAME}/hawk-${REF_NAME}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/humancto/hawk/releases/download/${REF_NAME}/hawk-${REF_NAME}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_aarch64_unknown_linux_gnu}"
              else
                url "https://github.com/humancto/hawk/releases/download/${REF_NAME}/hawk-${REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "hawk"
            end

            test do
              assert_match "hawk", shell_output("#{bin}/hawk --help")
            end
          end
          FORMULA
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' hawk.rb

          git clone https://x-access-token:${GH_TOKEN}@github.com/humancto/homebrew-tap.git tap
          cp hawk.rb tap/Formula/hawk.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hawk.rb
          git commit -m "Update hawk to ${REF_NAME}"
          git push
